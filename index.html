<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flux MC</title>

  <style>
    :root{
      --bg:#0b0712;
      --card:#120a22;
      --text:#f2eaff;
      --muted:#b7a6d6;
      --purple:#8b5cf6;
      --pink:#ec4899;
      --line: rgba(255,255,255,.10);
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 18px;
      --max: 1000px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(139,92,246,.28), transparent 65%),
        radial-gradient(700px 450px at 80% 20%, rgba(236,72,153,.20), transparent 60%),
        radial-gradient(900px 600px at 50% 100%, rgba(139,92,246,.18), transparent 70%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:28px 16px 56px;}

    .top{
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      padding:14px 14px;
      border:1px solid var(--line);
      background: rgba(18,10,34,.55);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position:sticky; top:12px;
      z-index:10;
    }

    .brand{display:flex; gap:10px; align-items:center; font-weight:900; letter-spacing:.4px;}

    .logo{
      width:40px; height:40px; border-radius:14px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      display:grid; place-items:center;
      box-shadow: 0 10px 30px rgba(139,92,246,.35);
      overflow:hidden;
    }
    .logo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .logo span{
      font-weight:1000;
      color:#140a22;
      font-size:14px;
    }

    .nav{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .chip{
      padding:10px 12px; border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      text-decoration:none;
      font-weight:800;
      color:var(--muted);
    }
    .chip:hover{border-color:rgba(139,92,246,.55); color:var(--text)}

    .banner{
      margin-top:18px;
      border-radius: var(--radius);
      border:1px solid var(--line);
      background: rgba(18,10,34,.45);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .banner img{
      width:100%;
      height:240px;
      object-fit:cover;
      display:block;
      filter:saturate(1.05) contrast(1.02);
    }

    .hero{
      margin-top:16px;
      padding:26px 18px;
      border-radius: var(--radius);
      border:1px solid var(--line);
      background: rgba(18,10,34,.45);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }

    h1{margin:0; font-size:40px; line-height:1.05}
    .sub{margin:0; color:var(--muted); font-size:16px; max-width:72ch}

    .cta{display:flex; gap:12px; flex-wrap:wrap; margin-top:6px}
    .btn{
      border:0; cursor:pointer; text-decoration:none;
      padding:12px 14px; border-radius:14px;
      font-weight:1000;
      display:inline-flex; gap:10px; align-items:center;
      user-select:none;
    }
    .btn-primary{
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color:#140a22;
      box-shadow: 0 14px 40px rgba(139,92,246,.25);
    }
    .btn-ghost{
      background: rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:var(--text);
    }

    .small{font-size:13px; color:var(--muted)}
    code.inline{
      background: rgba(255,255,255,.06);
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius:12px;
      font-weight:1000;
      letter-spacing:.3px;
      word-break: break-word;
      color: rgba(255,255,255,.92);
    }

    .grid{
      margin-top:16px;
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:14px;
    }
    .card{
      grid-column: span 6;
      padding:16px;
      border-radius: var(--radius);
      border:1px solid var(--line);
      background: rgba(18,10,34,.40);
      box-shadow: var(--shadow);
    }

    .vip-card{grid-column: span 12; padding:0; overflow:hidden;}
    .vip-banner{display:grid; grid-template-columns: 320px 1fr;}
    .vip-img img{width:100%; height:100%; object-fit:cover;}
    .vip-content{padding:16px; display:grid; gap:10px;}

    .footer{margin-top:18px; text-align:center; color:rgba(255,255,255,.45); font-size:12px}
  </style>
</head>

<body>
  <div class="wrap">
    <header class="top">
      <div class="brand">
        <div class="logo">
          <img id="logoImg" alt="Logo Flux MC" onerror="this.remove(); this.parentElement.innerHTML='<span>FX</span>';"/>
        </div>
        <div>Flux MC</div>
      </div>

      <nav class="nav">
        <a class="chip" href="#ip">IP</a>
        <a class="chip" href="#vip">VIP</a>
        <a class="chip" href="#discord">Discord</a>
        <a class="chip" href="regras.html">Regras</a>
        <a class="chip" href="loja.html">Loja</a>
      </nav>
    </header>

    <section class="banner">
      <img id="bannerImg" alt="Flux MC Banner" onerror="this.style.display='none'">
    </section>

    <section class="hero">
      <h1>Flux MC</h1>
      <p class="sub">
        Entre, jogue e evolua no Flux MC. Eventos, ranks, desafios e muito mais.
      </p>

      <div class="cta">
        <a class="btn btn-primary" href="loja.html">🛒 Abrir Loja</a>
        <a class="btn btn-ghost" href="regras.html">📌 Ver Regras</a>
      </div>
    </section>

    <div class="footer">© Flux MC — GitHub Pages</div>
  </div>

  <script>
    const LOGO_V = "1";
    const BANNER_V = "1";
    document.getElementById("logoImg").src = "assets/logo.png?v=" + LOGO_V;
    document.getElementById("bannerImg").src = "assets/banner.png?v=" + BANNER_V;
  </script>
</body>
</html>
