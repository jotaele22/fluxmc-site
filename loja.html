<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Flux MC — Loja</title>

<style>
:root{
--bg:#0b0712;
--card:#120a22;
--text:#f2eaff;
--muted:#b7a6d6;
--purple:#8b5cf6;
--pink:#ec4899;
--line: rgba(255,255,255,.10);
--shadow: 0 18px 60px rgba(0,0,0,.45);
--radius: 18px;
--max: 980px;
}
*{box-sizing:border-box}
body{
margin:0;
font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
background:
radial-gradient(900px 500px at 20% 10%, rgba(139,92,246,.28), transparent 65%),
radial-gradient(700px 450px at 80% 20%, rgba(236,72,153,.20), transparent 60%),
radial-gradient(900px 600px at 50% 100%, rgba(139,92,246,.18), transparent 70%),
var(--bg);
color:var(--text);
min-height:100vh;
}
.wrap{max-width:var(--max); margin:0 auto; padding:28px 16px 44px;}
.top{
display:flex; justify-content:space-between; align-items:center;
padding:14px;
border:1px solid var(--line);
background: rgba(18,10,34,.55);
border-radius: var(--radius);
box-shadow: var(--shadow);
}
.logo{
width:40px; height:40px; border-radius:14px;
background: linear-gradient(135deg, var(--purple), var(--pink));
display:grid; place-items:center;
font-weight:900;
color:#140a22;
}
.nav{display:flex; gap:10px;}
.chip{
padding:10px 12px;
border-radius:999px;
border:1px solid var(--line);
background: rgba(255,255,255,.04);
text-decoration:none;
color:var(--muted);
font-weight:700;
}
.hero{
margin-top:18px;
padding:24px;
border-radius: var(--radius);
border:1px solid var(--line);
background: rgba(18,10,34,.45);
box-shadow: var(--shadow);
}
h1{margin:0 0 10px 0}
.grid{
margin-top:16px;
display:grid;
grid-template-columns: 1fr 1fr;
gap:14px;
}
.card{
padding:16px;
border-radius: var(--radius);
border:1px solid var(--line);
background: rgba(18,10,34,.40);
box-shadow: var(--shadow);
}
.prod-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}
.price{
font-weight:900;
background: rgba(139,92,246,.18);
padding:6px 10px;
border-radius:999px;
}
.btn{
padding:12px 14px;
border-radius:14px;
border:0;
font-weight:900;
cursor:pointer;
}
.btn-primary{
background: linear-gradient(135deg, var(--purple), var(--pink));
color:#140a22;
}
code{
background: rgba(255,255,255,.06);
padding:6px 10px;
border-radius:12px;
font-weight:900;
display:inline-block;
margin-top:6px;
}
input, select{
width:100%;
padding:12px;
border-radius:14px;
border:1px solid var(--line);
background: rgba(0,0,0,.25);
color:white;
margin-top:6px;
}
.footer{
margin-top:20px;
text-align:center;
font-size:12px;
opacity:.5;
}
@media(max-width:760px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="wrap">

<header class="top">
<div style="display:flex;align-items:center;gap:10px;">
<div class="logo">FX</div>
<div><strong>Flux MC — Loja</strong></div>
</div>
<div class="nav">
<a class="chip" href="index.html">⬅ Voltar</a>
</div>
</header>

<section class="hero">
<h1>Comprar pelo Pix</h1>
<p>Pague no Pix e envie o comprovante para liberação.</p>
</section>

<section class="grid">

<div class="card">
<h2>Produtos</h2>

<div class="prod-item">
<div>VIP 30 dias</div>
<div class="price">R$ 9,90</div>
</div>

<div class="prod-item">
<div>VIP 60 dias</div>
<div class="price">R$ 17,90</div>
</div>

<div class="prod-item">
<div>Kit VIP</div>
<div class="price">R$ 4,90</div>
</div>

</div>

<div class="card">
<h2>Pix</h2>
Chave Pix:
<code id="pixKey">098.636.509-27</code>
<br><br>
<button class="btn btn-primary" onclick="copyPix()">Copiar chave Pix</button>
</div>

<div class="card">
<h2>Confirmar compra</h2>

<label>Seu Nick</label>
<input id="nick" placeholder="Ex: JLZINXX">

<label>Produto</label>
<select id="produto">
<option>VIP 30 dias</option>
<option>VIP 60 dias</option>
<option>Kit VIP</option>
</select>

<br><br>
<button class="btn btn-primary" onclick="enviarZap()">Já paguei</button>

</div>

</section>

<div class="footer">© Flux MC — Loja oficial</div>
</div>

<script>
const WHATSAPP_NUMBER = "5542999095985";

function copyPix(){
navigator.clipboard.writeText("098.636.509-27");
alert("Chave Pix copiada!");
}

function enviarZap(){
const nick = document.getElementById("nick").value;
const produto = document.getElementById("produto").value;

if(!nick){
alert("Coloque seu nick!");
return;
}

const msg = `[FLUX MC - COMPRA]
Nick: ${nick}
Produto: ${produto}
Envio o comprovante aqui.`;

const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
window.open(url, "_blank");
}
</script>

</body>
</html>
