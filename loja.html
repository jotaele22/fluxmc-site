<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loja - Flux MC</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0d0816;
  color:white;
}
header{
  text-align:center;
  padding:40px 20px;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
}
h1{
  margin:0;
  font-size:40px;
}
.container{
  max-width:1000px;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}
.card{
  background:#1a1229;
  border-radius:15px;
  padding:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.card h2{
  margin:10px 0;
}
.price{
  font-size:24px;
  font-weight:bold;
  color:#a855f7;
}
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  opacity:0.9;
}
footer{
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>
<body>

<header>
<h1>Loja Oficial Flux MC</h1>
<p>Adquira benefícios exclusivos e evolua no servidor</p>
</header>

<div class="container">

<div class="card">
<h2>VIP</h2>
<p>Tag exclusiva + Kit VIP</p>
<div class="price">R$10</div>
<button onclick="window.location.href='https://discord.gg/qsZ65QJc'">Comprar</button>
</div>

<div class="card">
<h2>VIP+</h2>
<p>Benefícios VIP + bônus especiais</p>
<div class="price">R$20</div>
<button onclick="window.location.href='https://discord.gg/qsZ65QJc'">Comprar</button>
</div>

<div class="card">
<h2>Coins 10k</h2>
<p>10.000 moedas no servidor</p>
<div class="price">R$5</div>
<button onclick="window.location.href='https://discord.gg/qsZ65QJc'">Comprar</button>
</div>

</div>

<footer>
© Flux MC - Todos os direitos reservados
</footer>

</body>
</html>
